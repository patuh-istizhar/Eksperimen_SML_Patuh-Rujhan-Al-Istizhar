name: Automated Preprocessing

on:
  push:
    branches:
      - main 
  pull_request:
    branches:
      - main 

jobs:
  preprocess-data:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas scikit-learn imbalanced-learn feature-engine

      - name: Run preprocessing script
        run: python preprocessing/automate_Patuh-Rujhan-Al-Istizhar.py

      - name: Configure Git for Commit
        run: |
          git config --global user.name ${{ secrets.USERNAME }}
          git config --global user.email ${{ secrets.EMAIL }}

      - name: Commit processed data
        run: |
          git add preprocessing/processed_data/train_processed.csv preprocessing/processed_data/test_processed.csv
          git commit -m 'Automated: Update preprocessed datasets' || echo "No changes to commit."
          git push